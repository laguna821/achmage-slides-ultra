name: Release Obsidian plugin

on:
  push:
    tags:
      # Match plugin version tags, e.g. 1.0.0 (NO leading "v" — must equal manifest.json "version").
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Obsidian requires these assets attached to the release at the repository root.
          gh release create "$tag" \
            --title="$tag" \
            --notes="Release $tag" \
            main.js manifest.json styles.css versions.json
